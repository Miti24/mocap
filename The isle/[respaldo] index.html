<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Islas de Texto Interactiva</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        :root {
            --bg-main: #f1f3f7;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --border-color: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #controls-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin: 24px;
            width: 90%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        .panel-header h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0 0 4px 0;
        }

        .panel-header p {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0;
        }

        .row {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 120px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"], select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            background: white;
            outline: none;
            box-sizing: border-box;
            height: 40px;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a5568' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 14px;
            padding-right: 32px;
        }

        .hidden-inputs {
            display: none !important;
        }

        .file-upload-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border: 1px solid #cbd5e1;
            color: var(--text-dark);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            height: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        .file-upload-btn:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }

        .custom-color-picker {
            position: relative;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 0 1px #cbd5e1;
            overflow: hidden;
        }

        .custom-color-picker input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 60px;
            height: 60px;
            border: none;
            margin: 0;
            padding: 0;
            cursor: pointer;
            opacity: 0;
        }

        .color-preview {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .color-pickers {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .color-item label {
            font-size: 9px;
        }

        button {
            background-color: var(--text-dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            height: 40px;
        }

        button:hover {
            background-color: #000000;
        }

        #export-btn:hover {
            background-color: #1d4ed8 !important;
        }

        .info-text {
            font-size: 11px;
            font-weight: 700;
            color: #2563eb;
            min-width: 120px;
            text-align: right;
        }

        #canvas-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 40px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="controls-panel">
        <div class="panel-header">
            <h1>The island in formation 2026</h1>
            <p>Inspired by the book Quelques îles en formation (2007) by Étienne Pressager.</p>
        </div>

        <div class="row">
            <div class="control-group" style="flex: 2; min-width: 200px;">
                <label for="text-input">Contenido del texto</label>
                <input type="text" id="text-input" value="Mocap Estudio">
            </div>
            <div class="control-group">
                <label for="size-slider">Escala Texto</label>
                <input type="range" id="size-slider" min="10" max="100" value="50">
            </div>
            <div class="control-group">
                <label for="stroke-slider">Grosor Contorno</label>
                <input type="range" id="stroke-slider" min="0" max="10" value="0">
            </div>
            <div class="control-group">
                <label for="rotate-slider">Rotar Orden Texto</label>
                <input type="range" id="rotate-slider" min="0" max="100" value="50">
            </div>
        </div>

        <div class="row">
            <div class="control-group" style="max-width: 120px;">
                <label for="size-mode">Definir por</label>
                <select id="size-mode">
                    <option value="ratio">Proporción</option>
                    <option value="pixels">Píxeles</option>
                </select>
            </div>

            <div class="control-group" id="ratio-selector-group" style="max-width: 150px;">
                <label for="aspect-ratio">Proporción Afiche</label>
                <select id="aspect-ratio">
                    <option value="1:1">Cuadrado (1:1)</option>
                    <option value="4:3">Estándar (4:3)</option>
                    <option value="3:4">Vertical (3:4)</option>
                    <option value="16:9">Panorámico (16:9)</option>
                    <option value="custom">Personalizado...</option>
                </select>
            </div>

            <div id="custom-dimensions" class="row hidden-inputs" style="gap: 10px;">
                <div class="control-group" style="max-width: 75px;">
                    <label id="label-w" for="custom-w">Ancho</label>
                    <input type="number" id="custom-w" min="100" max="2000" value="600">
                </div>
                <div class="control-group" style="max-width: 75px;">
                    <label id="label-h" for="custom-h">Alto</label>
                    <input type="number" id="custom-h" min="100" max="2000" value="600">
                </div>
            </div>

            <div class="control-group">
                <label>Imagen de Fondo</label>
                <label for="bg-image-input" class="file-upload-btn">Cargar Imagen</label>
                <input type="file" id="bg-image-input" accept="image/*" style="display: none;">
            </div>

            <div class="control-group">
                <label id="font-label">Tipografía (.ttf/.otf)</label>
                <label for="font-input" id="font-button-label" class="file-upload-btn">Cargar Fuente</label>
                <input type="file" id="font-input" accept=".ttf,.otf" style="display: none;">
            </div>
        </div>

        <div id="image-adjust-row" class="row hidden-inputs" style="background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px dashed #cbd5e1;">
            <div class="control-group">
                <label for="img-zoom">Zoom Imagen</label>
                <input type="range" id="img-zoom" min="10" max="300" value="100">
            </div>
            <div class="control-group">
                <label for="img-x">Posición X</label>
                <input type="range" id="img-x" min="-400" max="400" value="0">
            </div>
            <div class="control-group">
                <label for="img-y">Posición Y</label>
                <input type="range" id="img-y" min="-400" max="400" value="0">
            </div>
            <button id="remove-img-btn" style="background-color: #ef4444; height: 35px; padding: 0 10px; font-size: 11px;">Quitar Imagen</button>
        </div>

        <div class="row">
            <div class="color-pickers">
                <div class="color-item">
                    <div class="custom-color-picker">
                        <input type="color" id="bg-color" value="#5a636a">
                        <div id="bg-color-preview" class="color-preview" style="background-color: #5a636a;"></div>
                    </div>
                    <label for="bg-color">Color Isla</label>
                </div>
                <div class="color-item">
                    <div class="custom-color-picker">
                        <input type="color" id="text-color" value="#111111">
                        <div id="text-color-preview" class="color-preview" style="background-color: #111111;"></div>
                    </div>
                    <label for="text-color">Color Texto</label>
                </div>
                <div class="color-item">
                    <div class="custom-color-picker">
                        <input type="color" id="canvas-bg-color" value="#ffffff">
                        <div id="canvas-bg-preview" class="color-preview" style="background-color: #ffffff;"></div>
                    </div>
                    <label for="canvas-bg-color">Color Fondo</label>
                </div>
            </div>

            <div id="dynamic-info" class="info-text">Tamaño: 600x600 px</div>
            
            <div style="display: flex; gap: 10px;">
                <button id="reset-btn">Resetear</button>
                <button id="export-btn" style="background-color: #2563eb;">Exportar PNG</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let points = [];
        let grabbedPointIndex = null;
        let textString = "";
        let bgImg = null;
        let customFont = null; // Guardará el objeto de la tipografía cargada
        let lastPointsCount = 0;

        const textInput = document.getElementById('text-input');
        const bgColorInput = document.getElementById('bg-color');
        const textColorInput = document.getElementById('text-color');
        const canvasBgColorInput = document.getElementById('canvas-bg-color');
        
        const bgColorPreview = document.getElementById('bg-color-preview');
        const textColorPreview = document.getElementById('text-color-preview');
        const canvasBgPreview = document.getElementById('canvas-bg-preview');
        
        const sizeSlider = document.getElementById('size-slider');
        const strokeSlider = document.getElementById('stroke-slider');
        const rotateSlider = document.getElementById('rotate-slider');
        const resetBtn = document.getElementById('reset-btn');
        const exportBtn = document.getElementById('export-btn');
        const infoText = document.getElementById('dynamic-info');

        const sizeModeSelect = document.getElementById('size-mode');
        const ratioSelectorGroup = document.getElementById('ratio-selector-group');
        const aspectRatioSelect = document.getElementById('aspect-ratio');
        const customDimensionsDiv = document.getElementById('custom-dimensions');
        const customWInput = document.getElementById('custom-w');
        const customHInput = document.getElementById('custom-h');
        const labelW = document.getElementById('label-w');
        const labelH = document.getElementById('label-h');

        const bgImageInput = document.getElementById('bg-image-input');
        const imageAdjustRow = document.getElementById('image-adjust-row');
        const imgZoom = document.getElementById('img-zoom');
        const imgX = document.getElementById('img-x');
        const imgY = document.getElementById('img-y');
        const removeImgBtn = document.getElementById('remove-img-btn');

        // Referencias para la fuente
        const fontInput = document.getElementById('font-input');
        const fontButtonLabel = document.getElementById('font-button-label');

        function setup() {
            let canvas = createCanvas(600, 600);
            canvas.parent('canvas-container');
            
            resetBtn.addEventListener('click', fullReset);
            exportBtn.addEventListener('click', exportPoster);
            sizeModeSelect.addEventListener('change', handleSizeModeChange);
            aspectRatioSelect.addEventListener('change', updateCanvasDimensions);
            customWInput.addEventListener('input', updateCanvasDimensions);
            customHInput.addEventListener('input', updateCanvasDimensions);
            
            bgColorInput.addEventListener('input', () => bgColorPreview.style.backgroundColor = bgColorInput.value);
            textColorInput.addEventListener('input', () => textColorPreview.style.backgroundColor = textColorInput.value);
            canvasBgColorInput.addEventListener('input', () => canvasBgPreview.style.backgroundColor = canvasBgColorInput.value);
            
            bgImageInput.addEventListener('change', handleImageUpload);
            removeImgBtn.addEventListener('click', removeBackgroundImage);
            
            // Evento para capturar el archivo de la fuente
            fontInput.addEventListener('change', handleFontUpload);

            textAlign(CENTER, CENTER);
            updateSelectedFont(); // Aplica la fuente por defecto
            textStyle(BOLD);

            initializeIsland();
        }

        function draw() {
            background(canvasBgColorInput.value);
            
            if (bgImg) {
                push();
                imageMode(CENTER);
                translate(width / 2 + parseInt(imgX.value), height / 2 + parseInt(imgY.value));
                let zoomFactor = map(imgZoom.value, 10, 300, 0.1, 3.0);
                image(bgImg, 0, 0, bgImg.width * zoomFactor, bgImg.height * zoomFactor);
                pop();
            }
            
            textString = textInput.value.replace(/\s/g, '');
            let numPoints = textString.length;

            infoText.innerText = `Tamaño: ${width}x${height} px`;

            if (numPoints !== lastPointsCount && numPoints > 2) {
                adjustPointsCount();
                lastPointsCount = numPoints;
            }

            if (grabbedPointIndex !== null) {
                let targetX = mouseX;
                let targetY = mouseY;
                
                let deltaX = targetX - points[grabbedPointIndex].x;
                let deltaY = targetY - points[grabbedPointIndex].y;
                
                points[grabbedPointIndex].x = targetX;
                points[grabbedPointIndex].y = targetY;
                
                let total = points.length;
                let steps = 3; 
                let falloffs = [0.5, 0.25, 0.1];

                for (let i = 1; i <= steps; i++) {
                    let factor = falloffs[i - 1];
                    let idxRight = (grabbedPointIndex + i) % total;
                    points[idxRight].x += deltaX * factor;
                    points[idxRight].y += deltaY * factor;
                    
                    let idxLeft = (grabbedPointIndex - i + total) % total;
                    points[idxLeft].x += deltaX * factor;
                    points[idxLeft].y += deltaY * factor;
                }
            }

            fill(bgColorInput.value);
            let strokeVal = parseInt(strokeSlider.value);
            if (strokeVal > 0) {
                stroke(textColorInput.value);
                strokeWeight(strokeVal);
            } else {
                noStroke();
            }

            beginShape();
            for (let p of points) {
                vertex(p.x, p.y);
            }
            endShape(CLOSE);

            noStroke(); 
            fill(textColorInput.value);
            textSize(parseInt(sizeSlider.value));
            
            let shift = floor(map(rotateSlider.value, 0, 100, 0, numPoints));

            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                let letterIndex = (i - shift + numPoints) % numPoints;
                let letter = textString[letterIndex] || '';
                text(letter, p.x, p.y);
            }
        }

        // Carga y procesa la fuente local
        function handleFontUpload(e) {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    // p5.js procesa la URL de datos binarios y la convierte en una tipografía utilizable
                    customFont = loadFont(event.target.result, () => {
                        updateSelectedFont();
                        fontButtonLabel.innerText = file.name.substring(0, 12) + "..."; // Muestra el nombre recortado
                    });
                }
                reader.readAsDataURL(file);
            }
        }

        // Condiciona qué fuente usar en el renderizado
        function updateSelectedFont() {
            if (customFont) {
                textFont(customFont);
            } else {
                textFont('sans-serif');
            }
        }

        function handleImageUpload(e) {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    bgImg = loadImage(event.target.result, () => {
                        imageAdjustRow.classList.remove('hidden-inputs');
                        imgZoom.value = 100;
                        imgX.value = 0;
                        imgY.value = 0;
                    });
                }
                reader.readAsDataURL(file);
            }
        }

        function removeBackgroundImage() {
            bgImg = null;
            bgImageInput.value = "";
            imageAdjustRow.classList.add('hidden-inputs');
        }

        function handleSizeModeChange() {
            let mode = sizeModeSelect.value;
            if (mode === 'ratio') {
                ratioSelectorGroup.classList.remove('hidden-inputs');
                labelW.innerText = "Prop. X";
                labelH.innerText = "Prop. Y";
                if (aspectRatioSelect.value !== 'custom') {
                    customDimensionsDiv.classList.add('hidden-inputs');
                } else {
                    customDimensionsDiv.classList.remove('hidden-inputs');
                }
            } else {
                ratioSelectorGroup.classList.add('hidden-inputs');
                customDimensionsDiv.classList.remove('hidden-inputs');
                labelW.innerText = "Ancho (px)";
                labelH.innerText = "Alto (px)";
            }
            updateCanvasDimensions();
        }

        function updateCanvasDimensions() {
            let mode = sizeModeSelect.value;
            let targetW = 600;
            let targetH = 600;

            if (mode === 'ratio') {
                let ratio = aspectRatioSelect.value;
                if (ratio === 'custom') {
                    customDimensionsDiv.classList.remove('hidden-inputs');
                    let rX = parseFloat(customWInput.value) || 1;
                    let rY = parseFloat(customHInput.value) || 1;
                    targetH = Math.round(targetW * (rY / rX));
                } else {
                    customDimensionsDiv.classList.add('hidden-inputs');
                    if (ratio === "4:3") targetH = Math.round(targetW * (3 / 4));
                    if (ratio === "3:4") targetH = Math.round(targetW * (4 / 3));
                    if (ratio === "16:9") targetH = Math.round(targetW * (9 / 16));
                }
            } else {
                targetW = parseInt(customWInput.value) || 600;
                targetH = parseInt(customHInput.value) || 600;
            }

            resizeCanvas(targetW, targetH);
            initializeIsland();
        }

        function initializeIsland() {
            points = [];
            textString = textInput.value.replace(/\s/g, '');
            let numPoints = textString.length;
            lastPointsCount = numPoints;
            
            let centerX = width / 2;
            let centerY = height / 2;
            let radius = min(width, height) * 0.28;

            for (let i = 0; i < numPoints; i++) {
                let angle = map(i, 0, numPoints, 0, TWO_PI);
                let x = centerX + cos(angle) * radius;
                let y = centerY + sin(angle) * radius;
                points.push({ x: x, y: y });
            }
        }

        function fullReset() {
            sizeSlider.value = 50;
            strokeSlider.value = 0;
            rotateSlider.value = 50;
            
            bgColorInput.value = "#5a636a";
            textColorInput.value = "#111111";
            canvasBgColorInput.value = "#ffffff";
            
            bgColorPreview.style.backgroundColor = "#5a636a";
            textColorPreview.style.backgroundColor = "#111111";
            canvasBgPreview.style.backgroundColor = "#ffffff";
            
            // Reiniciar también la fuente por defecto
            customFont = null;
            fontInput.value = "";
            fontButtonLabel.innerText = "Cargar Fuente";
            updateSelectedFont();
            
            removeBackgroundImage();
            initializeIsland();
        }

        function adjustPointsCount() {
            let currentText = textInput.value.replace(/\s/g, '');
            if(currentText.length < 3) return;
            
            let centerX = 0, centerY = 0;
            for(let p of points) {
                centerX += p.x;
                centerY += p.y;
            }
            centerX = points.length ? centerX / points.length : width / 2;
            centerY = points.length ? centerY / points.length : height / 2;
            
            let radius = min(width, height) * 0.28;
            points = [];
            for (let i = 0; i < currentText.length; i++) {
                let angle = map(i, 0, currentText.length, 0, TWO_PI);
                let x = centerX + cos(angle) * radius;
                let y = centerY + sin(angle) * radius;
                points.push({ x: x, y: y });
            }
        }

        function mousePressed() {
            let closestDist = 30;
            grabbedPointIndex = null;
            for (let i = 0; i < points.length; i++) {
                let d = dist(mouseX, mouseY, points[i].x, points[i].y);
                if (d < closestDist) {
                    closestDist = d;
                    grabbedPointIndex = i;
                }
            }
        }

        function mouseReleased() {
            grabbedPointIndex = null;
        }

        function exportPoster() {
            let name = textInput.value.trim().toLowerCase().replace(/\s+/g, '-');
            if (!name) name = 'afiche-isla';
            saveCanvas(name, 'png');
        }
    </script>
</body>
</html>
